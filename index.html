<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossy Blue Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-app">
        <div class="glass-reflection"></div>
        
        <div class="hero-display">
            <div class="sunshine-container">
                <div class="sunshine-rays"></div>
                <div class="sunshine-core"></div>
            </div>
            
            <h1 class="temp-3d">90</h1>
            
            <div class="weather-status-bar">
                <span class="condition-label">SUNNY</span>
                <span class="uv-index">UV 9</span>
            </div>
            <div class="high-low-tag">H: 90°  L: 75°</div>
        </div>

        <div class="city-container">
            <input type="text" class="city-input" value="PANAMA CITY BEACH" placeholder="ENTER CITY...">
            <div class="timeline-indicator">TODAY</div>
        </div>

        <div class="forecast-grid">
            
            <div class="forecast-card">
                <span class="day-id">TUE</span>
                <div class="mini-display">
                    <span class="mini-temp">86</span>
                    <span class="mini-status status-sunny"></span>
                </div>
            </div>

            <div class="forecast-card">
                <span class="day-id">WED</span>
                <div class="mini-display">
                    <span class="mini-temp">80</span>
                    <span class="mini-status status-cloudy"></span>
                </div>
            </div>

            <div class="forecast-card">
                <span class="day-id">THU</span>
                <div class="mini-display">
                    <span class="mini-temp">85</span>
                    <span class="mini-status status-sunny"></span>
                </div>
            </div>

            <div class="forecast-card">
                <span class="day-id">FRI</span>
                <div class="mini-display">
                    <span class="mini-temp">83</span>
                    <span class="mini-status status-cloudy"></span>
                </div>
            </div>

            <div class="forecast-card">
                <span class="day-id">SAT</span>
                <div class="mini-display">
                    <span class="mini-temp">88</span>
                    <span class="mini-status status-sunny"></span>
                </div>
            </div>

            <div class="forecast-card next-preview">
                <span class="day-id">SUN</span>
                <div class="mini-display">
                    <span class="mini-temp">87</span>
                    <span class="mini-status status-sunny"></span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
